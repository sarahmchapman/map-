<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#f5f0ea"/>
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#b8955a" stroke-width="1.5"/>
  <!-- Cross lines - like an astrocartography map -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#b8955a" stroke-width="1" opacity="0.5"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#b8955a" stroke-width="1" opacity="0.5"/>
  <!-- Centre dot -->
  <circle cx="16" cy="16" r="2.5" fill="#b8955a"/>
</svg>
