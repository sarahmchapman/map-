<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>elsewhere — signing you in</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1714;--ink-3:#4a4540;--paper:#faf8f4;--gold:#b8955a;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',sans-serif;}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
.wordmark{font-family:var(--serif);font-size:1rem;font-weight:300;letter-spacing:.35em;text-transform:lowercase;color:var(--gold);margin-bottom:2rem}
.msg{font-family:var(--serif);font-size:1.1rem;font-style:italic;color:var(--ink-3);line-height:1.6}
.star{color:var(--gold);font-size:1.2rem;margin-bottom:1rem}
</style>
</head>
<body>
<div>
  <div class="wordmark">elsewhere</div>
  <div class="star">✦</div>
  <p class="msg" id="msg">Signing you in…</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = 'https://wdulylmxhvlxhjfmfivu.supabase.co';
var SUPABASE_KEY = 'sb_publishable_pBoHzlLsZiLAr7EYF824DA_R6pw5sdR';
var _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function handleCallback() {
  try {
    var msgEl = document.getElementById('msg');

    // Supabase automatically handles the code exchange from URL params
    // Just call getSession after a brief moment for it to process
    var { data, error } = await _sb.auth.getSession();

    if (error || !data.session) {
      // Try exchanging code manually
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');

      if (code) {
        var result = await _sb.auth.exchangeCodeForSession(code);
        if (result.error) {
          console.error('Exchange error:', result.error);
          msgEl.textContent = 'Sign in failed. Please try again.';
          setTimeout(function() { window.location.href = '/'; }, 2000);
          return;
        }
        data = result.data;
      } else {
        msgEl.textContent = 'Sign in failed. Please try again.';
        setTimeout(function() { window.location.href = '/'; }, 2000);
        return;
      }
    }

    if (!data || !data.session) {
      msgEl.textContent = 'Sign in failed. Please try again.';
      setTimeout(function() { window.location.href = '/'; }, 2000);
      return;
    }

    var user = data.session.user;
    msgEl.textContent = 'You\'re in. Taking you to your chart…';

    // Save minimal user info so index.html can use it immediately
    localStorage.setItem('elsewhere_user', JSON.stringify({
      id: user.id,
      email: user.email
    }));

    // Supabase already saved the full session to localStorage automatically
    // Flag that we should auto-submit on the next page load
    localStorage.setItem('elsewhere_autologin', '1');

    setTimeout(function() { window.location.href = '/profile.html'; }, 1000);

  } catch (err) {
    console.error('Auth callback error:', err);
    document.getElementById('msg').textContent = 'Something went wrong. Redirecting…';
    setTimeout(function() { window.location.href = '/'; }, 2000);
  }
}

handleCallback();
</script>
</body>
</html>
